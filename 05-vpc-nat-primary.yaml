apiVersion: v1
kind: Namespace
metadata:
  name: red
---
apiVersion: kubeovn.io/v1
kind: Vpc
metadata:
  name: red-vpc
spec:
  namespaces:
    - red
  staticRoutes:
    - cidr: 0.0.0.0/0
      nextHopIP: 172.30.0.254
      policy: policyDst
---
# Primary subnet for pods in red namespace (no provider = default kube-ovn interface)
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: red-default
spec:
  vpc: red-vpc
  namespaces:
    - red
  protocol: IPv4
  cidrBlock: 172.30.1.0/24
  gateway: 172.30.1.1
  excludeIps:
    - 172.30.1.1
---
# LAN subnet for NAT gateway only - pods don't attach to this directly
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: attachnet-red
spec:
  vpc: red-vpc
  protocol: IPv4
  provider: attachnet.red.ovn
  cidrBlock: 172.30.0.0/24
  gateway: 172.30.0.1
  excludeIps:
    - 172.30.0.1
    - 172.30.0.254
---
# Required by vpc-nat-gw pod to attach to attachnet-red subnet
# Even though regular pods don't use this, the NAT GW pod needs it
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: attachnet
  namespace: red
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "kube-ovn",
      "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
      "provider": "attachnet.red.ovn"
    }'
---
# External network - WAN side of NAT gateway
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: ovn-vpc-external-network
spec:
  protocol: IPv4
  provider: ovn-vpc-external-network.kube-system
  cidrBlock: 10.10.10.0/24
  gateway: 10.10.10.1
  excludeIps:
    - 10.10.10.1..10.10.10.80
    - 10.10.10.83..10.10.10.254
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: ovn-vpc-external-network
  namespace: kube-system
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "kube-ovn",
        "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
        "provider": "ovn-vpc-external-network.kube-system"
      }
    }'
---
apiVersion: kubeovn.io/v1
kind: VpcNatGateway
metadata:
  name: red-gw
spec:
  vpc: red-vpc
  subnet: attachnet-red
  lanIp: 172.30.0.254
  selector:
    - "kubernetes.io/hostname: rke2-02"
    - "kubernetes.io/os: linux"
  externalSubnets:
    - ovn-vpc-external-network
---
# Pod gets primary interface in red-vpc via red-default subnet
# No multus annotation needed - routing works via OVN logical router
apiVersion: v1
kind: Pod
metadata:
  name: red-pod
  namespace: red
  annotations:
    ovn.kubernetes.io/ip_address: 172.30.1.2  # Pin IP so FIP rule matches
spec:
  containers:
    - name: netshoot
      image: nicolaka/netshoot
      command: ["sleep", "infinity"]
---
apiVersion: kubeovn.io/v1
kind: IptablesEIP
metadata:
  name: red-eip
spec:
  natGwDp: red-gw
  externalSubnet: ovn-vpc-external-network
  v4ip: 10.10.10.82
---
apiVersion: kubeovn.io/v1
kind: IptablesFIPRule
metadata:
  name: red-fip
spec:
  eip: red-eip
  internalIp: 172.30.1.2